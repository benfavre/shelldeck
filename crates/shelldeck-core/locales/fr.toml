ai.prompt.terminal_diagnostic_plan = "Analyse la dernière erreur visible et retourne uniquement un objet JSON valide, sans Markdown, de la forme {\"summary\":\"cause probable concise\",\"steps\":[{\"title\":\"titre\",\"command\":\"commande\",\"explanation\":\"ce que cette étape vérifie\"}]}. Fournis de 1 à 5 étapes non destructives. Chaque commande doit être unique, sur une seule ligne, bornée et en lecture seule. Exécutables autorisés : cat, df, dig, docker, du, free, git, grep, head, hostname, ip, journalctl, kubectl, ls, lsof, netstat, nslookup, ping, ps, pwd, ss, stat, systemctl, tail, traceroute, uname, uptime, whoami. N'utilise ni sudo, ni opérateur shell, ni redirection, ni sous-commande de mutation, ni suivi continu."
ai.prompt.terminal_diagnostic_repair = "La réponse ne respecte pas le schéma de diagnostic sécurisé (%{error}). Régénère uniquement l'objet JSON valide demandé, avec 1 à 5 commandes de lecture autorisées, sans Markdown."
ai.prompt.naming = "Propose trois noms courts et distinctifs à partir du contexte."
ai.prompt.entity_name = "Propose un nom court, précis et reconnaissable pour cet élément à partir du contexte fourni. Réponds uniquement avec un objet JSON strict de la forme {\"name\":\"Nom proposé\"}. Le nom doit tenir sur une ligne et faire au maximum 80 caractères."
ai.prompt.terminal_issue = "Transforme la dernière erreur visible en demande structurée avec titre, contexte, reproduction et résultat attendu."
