ai.prompt.issue_draft = "Turn this context into a structured request with title, description, steps, and expected outcome."
ai.prompt.issue_generate_form = "Return only a valid JSON object, without a Markdown fence or surrounding text, with exactly these keys: {\"title\":\"short precise title\",\"description\":\"structured description with context, reproduction, expected outcome, and environment when available\",\"priority\":\"low|normal|high|urgent\"}. Improve existing draft fields when they are already populated. Use hosts from context only when explicitly relevant. Do not invent missing information, create, or send anything."
ai.prompt.issue_generate_repair = "Your previous response did not match the required JSON schema (%{error}). Regenerate only the requested valid JSON object, without Markdown."
ai.prompt.issue_tags = "Suggest at most five useful tags without modifying the request."
ai.prompt.issue_priority = "Assess priority and justify it using observable context."
ai.prompt.issue_reply = "Draft a clear reply to the requester using the request and its comments. Do not send it."
ai.prompt.issue_summary = "Summarize the request, its status, actions already attempted, and the recommended next step."
ai.prompt.issue_triage = "Return only a strict JSON object without Markdown, with exactly these fields: {\"priority\":\"low|normal|high|urgent\" or null,\"assignee\":\"exact email of an available agent\", an empty string to unassign, or null,\"rationale\":\"short rationale\",\"next_actions\":[\"action\"]}. Use null to leave a field unchanged. Never suggest an agent absent from the provided list."
ai.prompt.issue_triage_repair = "The response does not match the triage schema (%{error}). Regenerate only the requested strict JSON object."
ai.prompt.script_generate = "Generate a script for the goal I will specify. Return only a commented draft."
ai.prompt.script_generate_form = "Return only a valid JSON object, without a Markdown fence or surrounding text, with exactly these keys: {\"name\":\"short name\",\"description\":\"concise description\",\"language\":\"shell|python|node|bun|php|mysql|postgresql|docker|docker_compose|systemd|nginx\",\"category\":\"system|database|web|runtime|container|network|security|custom|uncategorized\",\"body\":\"raw script body\"}. Fill every field. Use the selected target and host when relevant. Do not save or execute anything."
ai.prompt.script_generate_repair = "Your previous response did not match the required JSON schema (%{error}). Regenerate only the requested valid JSON object, without Markdown."
ai.prompt.script_explain = "Explain this script, its prerequisites, effects, and risks."
ai.prompt.script_convert = "Suggest a conversion to an appropriate language and explain important differences."
ai.prompt.script_review = "Review this script for errors, portability, security, and idempotency."
ai.prompt.script_fix = "Fix the script using the exit code and log from its latest failed execution. Return only the complete corrected body, without a Markdown fence or explanation. Preserve the script intent, variables, and target. Do not execute it."
ai.prompt.terminal_command = "Suggest a command for the goal I will specify. Do not run it and explain risks."
ai.prompt.terminal_command_strict = "Suggest one shell command for the specified goal. Return only the exact command on one line, with no Markdown, no comment, and do not run it."
ai.prompt.terminal_error = "Analyze the latest visible error, explain the likely cause, and suggest non-destructive diagnostic steps."
ai.prompt.terminal_diagnostic_plan = "Analyze the latest visible error and return only a valid JSON object, without Markdown, shaped as {\"summary\":\"concise likely cause\",\"steps\":[{\"title\":\"title\",\"command\":\"command\",\"explanation\":\"what this step checks\"}]}. Provide 1 to 5 non-destructive steps. Every command must be unique, single-line, bounded, and read-only. Allowed executables: cat, df, dig, docker, du, free, git, grep, head, hostname, ip, journalctl, kubectl, ls, lsof, netstat, nslookup, ping, ps, pwd, ss, stat, systemctl, tail, traceroute, uname, uptime, whoami. Do not use sudo, shell operators, redirections, mutating subcommands, or continuous follow modes."
ai.prompt.terminal_diagnostic_repair = "The response does not match the secure diagnostic schema (%{error}). Regenerate only the requested valid JSON object with 1 to 5 allowed read-only commands and no Markdown."
ai.prompt.naming = "Suggest three short, distinctive names from the context."
ai.prompt.entity_name = "Suggest a short, precise, recognizable name for this item from the supplied context. Return only a strict JSON object shaped as {\"name\":\"Suggested name\"}. The name must fit on one line and contain at most 80 characters."
