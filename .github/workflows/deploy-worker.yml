name: Deploy Update Worker

# Deploys the Cloudflare update/landing worker whenever its code changes on
# main (and on demand). Until now the worker had to be deployed by hand, so
# code changes to it (e.g. the landing page or install scripts) never shipped.
on:
  push:
    branches: [main]
    paths:
      - "cloudflare/update-worker/**"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy worker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloudflare/update-worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
