name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (build only, skip GitHub release)"
        type: boolean
        default: false
      test_windows_signing:
        description: "Sign Windows artifacts with the self-signed test certificate"
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always
  SHELLDECK_UPDATE_PUBLIC_KEY_BASE64: ${{ vars.SHELLDECK_UPDATE_PUBLIC_KEY_BASE64 }}

jobs:
  # ─── Extract version from tag or Cargo.toml ───
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      dry_run: ${{ steps.flags.outputs.dry_run }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Determine flags
        id: flags
        run: |
          DRY_RUN="${{ inputs.dry_run || 'false' }}"
          echo "dry_run=$DRY_RUN" >> "$GITHUB_OUTPUT"
          echo "Dry run: $DRY_RUN"

  # ─── Build on each platform ───
  build:
    name: Build (${{ matrix.platform }})
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            platform: linux-x86_64
            archive_ext: tar.gz
          - os: macos-15
            target: aarch64-apple-darwin
            platform: macos-aarch64
            archive_ext: zip
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows-x86_64
            archive_ext: zip

    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-03-06
          targets: ${{ matrix.target }}
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      # Linux dependencies
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libssl-dev \
            pkg-config \
            libxkbcommon-dev \
            libwayland-dev \
            libvulkan-dev \
            libfontconfig1-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxcb1-dev \
            libxkbcommon-x11-dev \
            libdbus-1-dev \
            libgtk-3-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            libfuse2

      # macOS dependencies
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install openssl pkg-config create-dmg

      - name: Require update verification key for tagged releases
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          if [ -z "$SHELLDECK_UPDATE_PUBLIC_KEY_BASE64" ]; then
            echo "SHELLDECK_UPDATE_PUBLIC_KEY_BASE64 repository variable is missing" >&2
            exit 1
          fi

      - name: Build release binary
        shell: bash
        env:
          SHELLDECK_DEFER_ARCHIVE: "1"
        run: bash scripts/build-release.sh

      # ─── Native Installers ───

      - name: Import Linux AppImage signing key
        if: runner.os == 'Linux' && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          LINUX_GPG_PRIVATE_KEY_BASE64: ${{ secrets.LINUX_GPG_PRIVATE_KEY_BASE64 }}
        run: |
          if [ -z "$LINUX_GPG_PRIVATE_KEY_BASE64" ]; then
            echo "LINUX_GPG_PRIVATE_KEY_BASE64 secret is missing" >&2
            exit 1
          fi
          printf '%s' "$LINUX_GPG_PRIVATE_KEY_BASE64" | base64 --decode | gpg --batch --import

      # Linux: AppImage
      - name: Build AppImage
        if: runner.os == 'Linux'
        env:
          SHELLDECK_APPIMAGE_SIGN: ${{ startsWith(github.ref, 'refs/tags/v') && '1' || '0' }}
        run: bash packaging/linux/build-appimage.sh

      - name: Import Apple Developer ID certificate
        if: runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          APPLE_DEVELOPER_ID_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 }}
          APPLE_DEVELOPER_ID_P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
        run: |
          if [ -z "$APPLE_DEVELOPER_ID_P12_BASE64" ] && [ -z "$APPLE_DEVELOPER_ID_P12_PASSWORD" ]; then
            echo "No Apple Developer ID certificate configured; using ad-hoc signing"
            exit 0
          fi
          if [ -z "$APPLE_DEVELOPER_ID_P12_BASE64" ] || [ -z "$APPLE_DEVELOPER_ID_P12_PASSWORD" ]; then
            echo "Apple Developer ID certificate configuration is incomplete" >&2
            exit 1
          fi
          KEYCHAIN="$RUNNER_TEMP/shelldeck-signing.keychain-db"
          CERTIFICATE="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"
          printf '%s' "$APPLE_DEVELOPER_ID_P12_BASE64" | base64 --decode > "$CERTIFICATE"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERTIFICATE" -P "$APPLE_DEVELOPER_ID_P12_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

      # macOS: DMG
      - name: Build DMG
        if: runner.os == 'macOS'
        env:
          SHELLDECK_MACOS_SIGNING_IDENTITY: ${{ startsWith(github.ref, 'refs/tags/v') && secrets.APPLE_SIGNING_IDENTITY || '-' }}
          SHELLDECK_REQUIRE_SIGNING: ${{ startsWith(github.ref, 'refs/tags/v') && secrets.APPLE_SIGNING_IDENTITY != '' && '1' || '0' }}
        run: bash packaging/macos/build-dmg.sh

      - name: Notarize macOS update and disk image
        if: runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          APPLE_NOTARY_KEY_P8_BASE64: ${{ secrets.APPLE_NOTARY_KEY_P8_BASE64 }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
        run: |
          if [ -z "$APPLE_NOTARY_KEY_P8_BASE64" ] && [ -z "$APPLE_NOTARY_KEY_ID" ] && [ -z "$APPLE_NOTARY_ISSUER_ID" ]; then
            echo "No Apple notarization credentials configured; skipping notarization"
            exit 0
          fi
          if [ -z "$APPLE_NOTARY_KEY_P8_BASE64" ] || [ -z "$APPLE_NOTARY_KEY_ID" ] || [ -z "$APPLE_NOTARY_ISSUER_ID" ]; then
            echo "Apple notarization configuration is incomplete" >&2
            exit 1
          fi
          NOTARY_KEY="$RUNNER_TEMP/AuthKey_${APPLE_NOTARY_KEY_ID}.p8"
          printf '%s' "$APPLE_NOTARY_KEY_P8_BASE64" | base64 --decode > "$NOTARY_KEY"
          chmod 600 "$NOTARY_KEY"
          SHELLDECK_RELEASE_PLATFORM=macos-aarch64 bash scripts/package-release.sh
          xcrun notarytool submit dist/shelldeck-macos-aarch64.zip --wait \
            --key "$NOTARY_KEY" --key-id "$APPLE_NOTARY_KEY_ID" \
            --issuer "$APPLE_NOTARY_ISSUER_ID"
          xcrun notarytool submit dist/ShellDeck-macos-aarch64.dmg --wait \
            --key "$NOTARY_KEY" --key-id "$APPLE_NOTARY_KEY_ID" \
            --issuer "$APPLE_NOTARY_ISSUER_ID"
          xcrun stapler staple dist/ShellDeck-macos-aarch64.dmg
          xcrun stapler validate dist/ShellDeck-macos-aarch64.dmg

      # Windows: NSIS installer
      - name: Install NSIS
        if: runner.os == 'Windows'
        shell: bash
        run: choco install nsis -y

      - name: Sign Windows executable
        if: runner.os == 'Windows' && (startsWith(github.ref, 'refs/tags/v') || inputs.test_windows_signing)
        shell: pwsh
        env:
          WINDOWS_PRODUCTION_CERTIFICATE_PFX_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_PFX_BASE64 }}
          WINDOWS_PRODUCTION_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          WINDOWS_TEST_CERTIFICATE_PFX_BASE64: ${{ secrets.WINDOWS_TEST_CERTIFICATE_PFX_BASE64 }}
          WINDOWS_TEST_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_TEST_CERTIFICATE_PASSWORD }}
        run: |
          $hasProductionCertificate = [bool]$env:WINDOWS_PRODUCTION_CERTIFICATE_PFX_BASE64
          $hasProductionPassword = [bool]$env:WINDOWS_PRODUCTION_CERTIFICATE_PASSWORD
          if ($hasProductionCertificate -ne $hasProductionPassword) {
            throw "Windows production certificate configuration is incomplete"
          }
          $useSelfSignedCertificate = -not $hasProductionCertificate
          if ($useSelfSignedCertificate) {
            $certificateBase64 = $env:WINDOWS_TEST_CERTIFICATE_PFX_BASE64
            $certificatePassword = $env:WINDOWS_TEST_CERTIFICATE_PASSWORD
          } else {
            $certificateBase64 = $env:WINDOWS_PRODUCTION_CERTIFICATE_PFX_BASE64
            $certificatePassword = $env:WINDOWS_PRODUCTION_CERTIFICATE_PASSWORD
          }
          if (-not $certificateBase64 -or -not $certificatePassword) {
            throw "Windows Authenticode certificate secrets are missing"
          }
          $certificate = Join-Path $env:RUNNER_TEMP "shelldeck-signing.pfx"
          [IO.File]::WriteAllBytes(
            $certificate,
            [Convert]::FromBase64String($certificateBase64)
          )
          if ($useSelfSignedCertificate) {
            $flags = [Security.Cryptography.X509Certificates.X509KeyStorageFlags]::EphemeralKeySet
            $testCertificate = [Security.Cryptography.X509Certificates.X509Certificate2]::new(
              $certificate,
              $certificatePassword,
              $flags
            )
            $rootStore = [Security.Cryptography.X509Certificates.X509Store]::new(
              "Root",
              [Security.Cryptography.X509Certificates.StoreLocation]::CurrentUser
            )
            $rootStore.Open([Security.Cryptography.X509Certificates.OpenFlags]::ReadWrite)
            $rootStore.Add($testCertificate)
            $rootStore.Close()
            Write-Host "Trusted the self-signed certificate on this ephemeral runner only"
          }
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" |
            Sort-Object FullName | Select-Object -Last 1 -ExpandProperty FullName
          if (-not $signtool) { throw "signtool.exe was not found" }
          if ($useSelfSignedCertificate) {
            & $signtool sign /fd SHA256 /f $certificate /p $certificatePassword `
              "target/release/shelldeck.exe"
          } else {
            & $signtool sign /fd SHA256 /td SHA256 /tr "http://timestamp.digicert.com" `
              /f $certificate /p $certificatePassword `
              "target/release/shelldeck.exe"
          }
          & $signtool verify /pa /all /v "target/release/shelldeck.exe"

      - name: Build NSIS installer
        if: runner.os == 'Windows'
        shell: bash
        run: |
          export PATH="/c/Program Files (x86)/NSIS:$PATH"
          bash packaging/windows/build-nsis.sh

      - name: Sign Windows installer
        if: runner.os == 'Windows' && (startsWith(github.ref, 'refs/tags/v') || inputs.test_windows_signing)
        shell: pwsh
        env:
          WINDOWS_PRODUCTION_CERTIFICATE_PFX_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_PFX_BASE64 }}
          WINDOWS_PRODUCTION_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          WINDOWS_TEST_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_TEST_CERTIFICATE_PASSWORD }}
        run: |
          $certificate = Join-Path $env:RUNNER_TEMP "shelldeck-signing.pfx"
          $hasProductionCertificate = [bool]$env:WINDOWS_PRODUCTION_CERTIFICATE_PFX_BASE64
          $hasProductionPassword = [bool]$env:WINDOWS_PRODUCTION_CERTIFICATE_PASSWORD
          if ($hasProductionCertificate -ne $hasProductionPassword) {
            throw "Windows production certificate configuration is incomplete"
          }
          $certificatePassword = if (-not $hasProductionCertificate) {
            $env:WINDOWS_TEST_CERTIFICATE_PASSWORD
          } else {
            $env:WINDOWS_PRODUCTION_CERTIFICATE_PASSWORD
          }
          $useSelfSignedCertificate = -not $hasProductionCertificate
          if (-not $certificatePassword) {
            throw "Windows Authenticode certificate password is missing"
          }
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" |
            Sort-Object FullName | Select-Object -Last 1 -ExpandProperty FullName
          if (-not $signtool) { throw "signtool.exe was not found" }
          if ($useSelfSignedCertificate) {
            & $signtool sign /fd SHA256 /f $certificate /p $certificatePassword `
              "dist/ShellDeck-windows-x86_64-setup.exe"
          } else {
            & $signtool sign /fd SHA256 /td SHA256 /tr "http://timestamp.digicert.com" `
              /f $certificate /p $certificatePassword `
              "dist/ShellDeck-windows-x86_64-setup.exe"
          }
          & $signtool verify /pa /all /v "dist/ShellDeck-windows-x86_64-setup.exe"

      - name: Package signed auto-update archive
        shell: bash
        env:
          SHELLDECK_RELEASE_PLATFORM: ${{ matrix.platform }}
        run: bash scripts/package-release.sh

      # Upload archive artifact
      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: shelldeck-${{ matrix.platform }}
          path: dist/shelldeck-${{ matrix.platform }}.${{ matrix.archive_ext }}
          if-no-files-found: error
          retention-days: 14

      # Upload native installer artifact (Linux)
      - name: Upload AppImage
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: shelldeck-linux-appimage
          path: dist/ShellDeck-x86_64.AppImage
          if-no-files-found: warn
          retention-days: 14

      # Upload native installer artifact (macOS)
      - name: Upload DMG
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: shelldeck-macos-dmg
          path: dist/ShellDeck-macos-*.dmg
          if-no-files-found: warn
          retention-days: 14

      # Upload native installer artifact (Windows)
      - name: Upload NSIS installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: shelldeck-windows-setup
          path: dist/ShellDeck-windows-x86_64-setup.exe
          if-no-files-found: warn
          retention-days: 14

  # ─── Create GitHub Release ───
  release:
    name: Create GitHub Release
    needs: [prepare, build]
    if: startsWith(github.ref, 'refs/tags/v') && needs.prepare.outputs.dry_run != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          for dir in artifacts/shelldeck-*/; do
            cp "$dir"/* release-assets/ 2>/dev/null || true
          done
          echo "=== Release Assets ==="
          ls -la release-assets/

      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Sign checksum inventory
        env:
          LINUX_GPG_PRIVATE_KEY_BASE64: ${{ secrets.LINUX_GPG_PRIVATE_KEY_BASE64 }}
        run: |
          if [ -z "$LINUX_GPG_PRIVATE_KEY_BASE64" ]; then
            echo "LINUX_GPG_PRIVATE_KEY_BASE64 secret is missing" >&2
            exit 1
          fi
          printf '%s' "$LINUX_GPG_PRIVATE_KEY_BASE64" | base64 --decode | gpg --batch --import
          gpg --batch --armor --export > release-assets/ShellDeck-signing-key.asc
          gpg --batch --armor --detach-sign \
            --output release-assets/SHA256SUMS.txt.asc \
            release-assets/SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ShellDeck ${{ needs.prepare.outputs.version }}
          draft: false
          prerelease: ${{ contains(needs.prepare.outputs.version, '-beta') || contains(needs.prepare.outputs.version, '-rc') }}
          generate_release_notes: true
          files: |
            release-assets/*

      - name: Release summary
        run: |
          echo "=== Release Published ==="
          echo "  Version: ${{ needs.prepare.outputs.version }}"
          echo "  Tag:     ${{ github.ref_name }}"
          echo "  Assets:"
          ls -la release-assets/

  # ─── Publish update manifest to Cloudflare KV ───
  update-manifest:
    name: Publish Update Manifest
    needs: [prepare, release]
    if: startsWith(github.ref, 'refs/tags/v') && needs.prepare.outputs.dry_run != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate update manifest
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Compute SHA-256 and size for each platform archive
          declare -A PLATFORMS
          PLATFORMS[linux-x86_64]="shelldeck-linux-x86_64/shelldeck-linux-x86_64.tar.gz"
          PLATFORMS[macos-aarch64]="shelldeck-macos-aarch64/shelldeck-macos-aarch64.zip"
          PLATFORMS[windows-x86_64]="shelldeck-windows-x86_64/shelldeck-windows-x86_64.zip"

          jq -n \
            --arg version "$VERSION" \
            --arg pub_date "$PUB_DATE" \
            '{version: $version, pub_date: $pub_date, platforms: {}}' \
            > unsigned-manifest.json

          for PLATFORM in "${!PLATFORMS[@]}"; do
            FILE="artifacts/${PLATFORMS[$PLATFORM]}"
            if [ ! -f "$FILE" ]; then
              echo "Required update archive not found: $FILE" >&2
              exit 1
            fi
            SHA=$(sha256sum "$FILE" | awk '{print $1}')
            SIZE=$(stat -c%s "$FILE")
            URL="https://github.com/${REPO}/releases/download/${TAG}/$(basename "$FILE")"
            jq \
              --arg platform "$PLATFORM" \
              --arg url "$URL" \
              --arg sha256 "$SHA" \
              --argjson size "$SIZE" \
              '.platforms[$platform] = {url: $url, sha256: $sha256, size: $size}' \
              unsigned-manifest.json > next-manifest.json
            mv next-manifest.json unsigned-manifest.json
          done

          echo "=== Update Manifest ==="
          jq . unsigned-manifest.json

      - name: Sign update manifest
        env:
          SHELLDECK_UPDATE_PRIVATE_KEY_PEM_BASE64: ${{ secrets.SHELLDECK_UPDATE_PRIVATE_KEY_PEM_BASE64 }}
        run: |
          bash scripts/verify-update-signing-key.sh
          bash scripts/sign-update-manifest.sh \
            unsigned-manifest.json signed-manifest.json
          jq . signed-manifest.json

      - name: Upload manifest to Cloudflare KV
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}
        run: |
          curl -sf -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/storage/kv/namespaces/${CF_KV_NAMESPACE_ID}/values/latest-release" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data-binary @signed-manifest.json \
          && echo "Manifest uploaded successfully" \
          || (echo "Failed to upload manifest" && exit 1)

  # ─── Dry run summary ───
  dry-run-summary:
    name: Dry Run Summary
    needs: [prepare, build]
    if: needs.prepare.outputs.dry_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Summary
        run: |
          echo "=== DRY RUN ==="
          echo "Would have released:"
          echo "  Version: ${{ needs.prepare.outputs.version }}"
          echo "  Platforms: linux-x86_64, macos-aarch64, windows-x86_64"
          echo "  Artifacts:"
          find artifacts -type f -exec ls -la {} \;
